# この自動処理の名前です
name: Suwa Patrol

# 実行されるタイミングの設定
on:
  schedule:
    # 15分おきに自動でパトロールを開始します
    - cron: '*/15 * * * *'
  # GitHubのボタンから手動でいつでも動かせるようにします
  workflow_dispatch:

# ★渋滞防止：パトロールカーが2台同時に出動して事故るのを防ぎます
concurrency:
  group: suwa-patrol
  cancel-in-progress: false

jobs:
  build:
    # ロボットを動かすためのサーバー（仮想PC）を準備します
    runs-on: ubuntu-latest
    # ロボットに「ファイルを書き換える（徳ptを保存する）」許可を与えます
    permissions:
      contents: write
    
    steps:
      # ステップ1：GitHubから最新のプログラムファイルを取り寄せます
      - name: 🛰️ ファイルの読み込み
        uses: actions/checkout@v4

      # ステップ2：Python（プログラミング言語）を使えるようにセットアップします
      - name: 🐍 Pythonの準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # ステップ3：パトロールに必要な道具（ライブラリ）をインストールします
      - name: 📦 道具のインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ステップ4：【メイン業務】パトロールを実行して、Discordに報告を送ります
      - name: 🕵️ パトロール中！
        env:
          # Discordの送り先（秘密の鍵）を安全に読み込んでいます
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python suwa_patrol.py

      # ステップ5：増えた徳ポイントや履歴を、大切に金庫へ保存します
      - name: 📝 結果を保存して金庫に戻す
        run: |
          # ロボットの名前とメールアドレスを設定（保存時に必要です）
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 変更された「履歴ファイル」を保存の準備リストに入れます
          git add sent_messages.txt message_history.txt
          
          # 「パトロール完了！」というメモと共に保存を確定させます
          # （もし変更がなくてもエラーにならないように設定しています）
          git commit -m "Update patrol status [skip ci]" || exit 0
          
          # 保存する前に、ネット上の金庫（GitHub）に最新のデータがないか確認して合体させます
          git pull origin main --rebase
          
          # 最後に、あなたのGitHubリポジトリへデータを送信します
          git push
